<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Acopio - Portal de Administración</title>
    <!-- CSS Compilado localmente con Tailwind -->
    <link rel="stylesheet" href="/output.css">
    <!-- HTMX para solicitudes asíncronas ligeras -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        // Enable HTMX to perform swaps on validation errors (status 400 and 422)
        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('htmx:beforeSwap', function(evt) {
                if (evt.detail.xhr.status === 422 || evt.detail.xhr.status === 400) {
                    evt.detail.shouldSwap = true;
                    evt.detail.isError = false;
                }
            });
        });

        // Toggle Sidebar on both desktop and mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const mainWrapper = document.getElementById('main-wrapper');
            
            if (window.innerWidth >= 768) {
                // Desktop Toggle
                sidebar.classList.toggle('md:translate-x-0');
                sidebar.classList.toggle('md:-translate-x-full');
                mainWrapper.classList.toggle('md:ml-64');
                mainWrapper.classList.toggle('md:ml-0');
            } else {
                // Mobile Toggle
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }
    </script>
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50/50 min-h-screen font-sans antialiased text-gray-800 flex flex-col md:flex-row">

    <!-- Mobile Sidebar Dark Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-gray-900/60 z-40 hidden md:hidden transition-opacity duration-200" onclick="toggleSidebar()"></div>

    <!-- Responsive Navigation Sidebar (Venezuela Colors) -->
    <aside id="sidebar" class="fixed top-0 bottom-0 left-0 w-64 bg-[#081024] text-white border-r border-slate-900/50 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-250 ease-in-out flex flex-col h-full shrink-0 shadow-lg">
        <!-- Top Venezuela Tricolor Flag Bar -->
        <div class="h-1 bg-gradient-to-r from-amber-400 via-blue-500 to-red-500 w-full shrink-0"></div>
        
        <!-- Sidebar Header / Logo -->
        <div class="p-5 flex items-center justify-between shrink-0">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.reload();">
                <div class="h-8 w-8 bg-gradient-to-tr from-amber-400 via-blue-500 to-red-500 rounded-lg flex items-center justify-center text-white shadow-md shadow-blue-500/10">
                    <svg class="h-4.5 w-4.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2M19 11V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <div>
                    <span class="text-sm font-black tracking-tight text-slate-100">AcopioCentral</span>
                    <div class="text-[8px] font-black text-amber-400 uppercase tracking-widest leading-none mt-0.5">Venezuela</div>
                </div>
            </div>
            <!-- Close button inside Sidebar on Mobile -->
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white transition p-1 rounded-lg hover:bg-white/5" aria-label="Cerrar Menú">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Navigation Modules Links -->
        <nav class="flex-grow px-3 py-2 space-y-4 overflow-y-auto">
            <!-- Sección: General -->
            <div>
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-1.5 block">General</span>
                <button hx-get="/api/admin/dashboard" 
                        hx-target="#main-content" 
                        hx-swap="innerHTML"
                        hx-indicator="#nav-spinner"
                        onclick="if(window.innerWidth < 768) toggleSidebar();"
                        class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                    <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Inicio</span>
                </button>
            </div>
            
            <!-- Sección: Administración -->
            <div>
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-1.5 block">Administración</span>
                <div class="space-y-1">
                    <button hx-get="/api/admin/centers" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                        <span>Centros de Acopio</span>
                    </button>

                    <button hx-get="/api/admin/volunteers" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span>Voluntarios</span>
                    </button>

                    <button hx-get="/api/admin/catalog" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <span>Donaciones y Catálogo</span>
                    </button>
                </div>
            </div>

            <!-- Sección: Inventario -->
            <div>
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-1.5 block">Inventario</span>
                <div class="space-y-1">
                    <button hx-get="/api/volunteer/inventory/in" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Registrar Entrada</span>
                    </button>

                    <button hx-get="/api/volunteer/inventory/out" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span>Registrar Salida</span>
                    </button>

                    <button hx-get="/api/volunteer/inventory/stock" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <span>Inventario Actual</span>
                    </button>

                    <button hx-get="/api/volunteer/inventory/movements" 
                            hx-target="#main-content" 
                            hx-swap="innerHTML"
                            hx-indicator="#nav-spinner"
                            onclick="if(window.innerWidth < 768) toggleSidebar();"
                            class="w-full flex items-center space-x-3 px-3 py-2.5 text-xs font-semibold rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition duration-150 group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-amber-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>Historial de Movimientos</span>
                    </button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main Content Container Wrapper -->
    <div id="main-wrapper" class="flex-grow md:ml-64 flex flex-col min-h-screen transition-all duration-200 ease-in-out">
        
        <!-- Header bar containing the toggle button and connection status -->
        <header class="bg-white border-b border-gray-100 h-16 px-4 md:px-6 flex items-center justify-between shrink-0 sticky top-0 z-30">
            <div class="flex items-center space-x-3">
                <!-- Hamburger menu icon: opens and closes sidebar -->
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-[#0b1c3f] transition p-1.5 rounded-xl hover:bg-gray-100" aria-label="Toggle Sidebar">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 class="text-sm font-bold text-[#0b1c3f] uppercase tracking-wider hidden md:block">Tablero de Gestión</h2>
                
                <!-- Mobile brand (only on mobile) -->
                <div class="md:hidden flex items-center space-x-2">
                    <div class="h-7 w-7 bg-gradient-to-tr from-amber-400 via-blue-500 to-red-500 rounded-lg flex items-center justify-center text-white shadow-md shadow-blue-500/25">
                        <svg class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2" />
                        </svg>
                    </div>
                    <span class="text-base font-black tracking-tight text-[#0b1c3f]">AcopioCentral</span>
                </div>
            </div>

            <!-- Server Connection status & Logout -->
            <div class="flex items-center space-x-4">
                <div id="connection-indicator-top" class="text-xs font-semibold text-gray-500 flex items-center space-x-2">
                    <span class="h-2 w-2 rounded-full bg-green-500"></span>
                    <span class="hidden sm:inline">Conectado</span>
                </div>
                <a href="/auth/logout" class="text-xs font-bold text-red-600 hover:text-red-800 transition flex items-center space-x-1 px-3 py-1.5 rounded-lg hover:bg-red-50">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" />
                    </svg>
                    <span class="hidden sm:inline">Salir</span>
                </a>
            </div>
            
            <!-- Venezuela flag decorative border at top of header -->
            <div class="h-[3px] bg-gradient-to-r from-amber-400 via-blue-500 to-red-500 absolute bottom-0 left-0 right-0"></div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="main-content" hx-get="/api/admin/dashboard" hx-trigger="load" hx-indicator="#main-spinner" class="transition-all duration-300">
                <!-- Loading Spinner shown on startup -->
                <div id="main-spinner" class="flex flex-col justify-center items-center py-20 space-y-4">
                    <span class="animate-spin rounded-full h-10 w-10 border-4 border-amber-400 border-t-[#0b1c3f]"></span>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest animate-pulse">Cargando Tablero...</p>
                </div>
            </div>
        </main>

        <!-- Premium Venezuela Footer -->
        <footer class="bg-white border-t border-gray-100 py-6 text-center text-xs text-gray-400 mt-auto">
            <p>© 2026 AcopioCentral MVP. Diseñado para la República Bolivariana de Venezuela.</p>
        </footer>
    </div>

</body>
</html>
