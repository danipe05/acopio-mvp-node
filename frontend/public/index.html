<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Centro de Acopio - Offline MVP</title>
    <!-- CSS Compilado localmente con Tailwind -->
    <link rel="stylesheet" href="/output.css">
    <!-- HTMX para solicitudes asíncronas ligeras -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6 font-sans">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6 border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Centro de Acopio</h1>
            <p class="text-sm text-gray-500 mt-2">Monolito optimizado para redes locales sin internet.</p>
        </div>
        
        <div class="border-t border-gray-100 pt-6 flex flex-col items-center space-y-4">
            <button hx-get="/api/info" 
                    hx-target="#backend-status" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Verificar Servidor y DB
            </button>
            
            <div id="backend-status" class="w-full text-center text-sm font-medium">
                <!-- La respuesta HTMX se inyectará aquí -->
                <span class="text-gray-400">Sin verificar</span>
            </div>
        </div>
    </div>
</body>
</html>
